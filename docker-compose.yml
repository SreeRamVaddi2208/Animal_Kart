services:
  # ── Frontend (Next.js) ───────────────────────────────
  frontend:
    build:
      context: ./animalkart
      args:
        # Browser-side API URL — the user's browser hits this.
        # Since the browser is outside Docker, this MUST be localhost.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: animalkart-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (FastAPI) ────────────────────────────────
  backend:
    build: ./backend
    container_name: animalkart-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - odoo
    restart: unless-stopped

  # ── Odoo 17 ──────────────────────────────────────────
  odoo:
    image: odoo:17
    container_name: animalkart-odoo
    depends_on:
      - odoo-db
    ports:
      - "8069:8069"
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - odoo-extra-addons:/mnt/extra-addons
    restart: unless-stopped

  # ── PostgreSQL (for Odoo) ────────────────────────────
  odoo-db:
    image: postgres:16
    container_name: animalkart-odoo-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-data:
  odoo-extra-addons:
